server {
	server_name csmc-view.example.com;

	client_max_body_size 100m;
	send_timeout 10m;

	# error handling
	error_page 404 /error?cause=404;
	error_page 403 /error?cause=403;

	# csp and web security settings
	add_header "X-Permitted-Cross-Domain-Policies" "none";
	add_header "Referrer-Policy" "strict-origin";
	add_header "X-XSS-Protection" "1";
	add_header "X-Frame-Options" "SAMEORIGIN";
	add_header "Strict-Transport-Security" "max-age=15552000";
	add_header "Content-Security-Policy" "default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https://*.example.com; img-src 'self' data: https://*.example.com https://tile.openstreetmap.org;";

	# proxy settings
	proxy_set_header X-Forwarded-Proto $scheme;
	proxy_set_header Connection $http_connection;
	proxy_set_header Upgrade $http_upgrade;
	proxy_set_header Host $host;

	proxy_http_version 1.1;
	
	proxy_connect_timeout 10m;
	proxy_send_timeout 10m;
	proxy_read_timeout 10m;

	proxy_redirect off;
	proxy_buffering off;

	location ~ ^/(api|create|preview/?$) {
		# this can be used to bloc access to parts of the server,
		# here the api, create processes, and the preview tool.
		error_page 403 /error?cause=uhh-internal;

		allow x.y.0.0/16; # internal allowed subnet
		deny all;

		proxy_pass http://127.0.0.1:8000; # docker container port
	}
	location / {
		
		proxy_pass http://127.0.0.1:8000; # docker container port
	}

	# SSL ??
}
